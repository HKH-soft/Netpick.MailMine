# Development overrides - automatically loaded by docker-compose
services:
  backend:
    environment:
      - JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005
    ports:
      - "8080:8080"
      - "5005:5005"

  frontend:
    ports:
      - "3000:3000"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  prometheus:
    ports:
      - "9090:9090"

  alertmanager:
    ports:
      - "9093:9093"