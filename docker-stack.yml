version: '3.8'

services:
  # ===== Backend =====
  backend:
    image: backend:latest
    build:
      context: ./Backend
      dockerfile: Dockerfile
    secrets:
      - ACTUATOR_USERNAME_secret
      - ACTUATOR_PASSWORD_secret
      - CORS_ALLOWED_ORIGINS_secret
      - CORS_ALLOWED_METHODS_secret
      - CORS_ALLOWED_HEADERS_secret
      - CORS_EXPOSED_HEADERS_secret
      - DATABASE_NAME_secret
      - GEMINI_API_KEY_secret
      - GMAIL_USERNAME_secret
      - GMAIL_PASSWORD_secret
      - JWT_SECRET_KEY_secret
      - JWT_ISSUER_secret
      - POSTGRES_USERNAME_secret
      - POSTGRES_PASSWORD_secret
      - POSTGRES_URL_secret
      - REDIS_HOST_secret
      - REDIS_PORT_secret
      - REDIS_PASSWORD_secret
      - SERVER_PORT_secret
      - XRAY_EXECUTABLE_PATH_secret
    environment:
      - ACTUATOR_USERNAME_FILE=/run/secrets/ACTUATOR_USERNAME_secret
      - ACTUATOR_PASSWORD_FILE=/run/secrets/ACTUATOR_PASSWORD_secret
    depends_on:
      - postgres
      - redis
    networks:
      - app-net
      - monitoring-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  # ===== Frontend =====
  frontend:
    image: frontend:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=https://netpick.ir/api
      - NODE_ENV=production
    networks:
      - app-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== PostgreSQL =====
  postgres:
    image: postgres:17-alpine
    secrets:
      - POSTGRES_USER_secret
      - POSTGRES_PASSWORD_secret
      - POSTGRES_DB_secret
      - PGDATA_secret
    environment:
      - POSTGRES_USER_FILE=/run/secrets/POSTGRES_USER_secret
      - POSTGRES_PASSWORD_FILE=/run/secrets/POSTGRES_PASSWORD_secret
      - POSTGRES_DB_FILE=/run/secrets/POSTGRES_DB_secret
      - PGDATA_FILE=/run/secrets/PGDATA_secret
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    networks:
      - app-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== Redis =====
  redis:
    image: redis:8.4-alpine
    secrets:
      - REDIS_PASSWORD_secret
    command: sh -c 'redis-server --requirepass "$$(cat /run/secrets/REDIS_PASSWORD_secret)" --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru'
    volumes:
      - redis-data:/data
    networks:
      - app-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== NGINX =====
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./app-config/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    environment:
      - APP_ENV=production
    depends_on:
      - frontend
      - backend
    networks:
      - app-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== Prometheus =====
  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./app-config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./app-config/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prom-data:/prometheus
    environment:
      - ACTUATOR_USERNAME_FILE=/run/secrets/ACTUATOR_USERNAME_secret
      - ACTUATOR_PASSWORD_FILE=/run/secrets/ACTUATOR_PASSWORD_secret
    networks:
      - monitoring-net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== Alertmanager =====
  alertmanager:
    image: prom/alertmanager:v0.28.0
    env_file:
      - ./.config/docker/alertmanager.env
    volumes:
      - ./app-config/prometheus/alertmanager.yml.tpl:/etc/alertmanager/alertmanager.yml.tpl:ro
      - ./app-config/prometheus/alertmanager-entrypoint.sh:/usr/local/bin/alertmanager-entrypoint.sh:ro
      - alertmanager-data:/alertmanager
    entrypoint: ["/bin/sh", "/usr/local/bin/alertmanager-entrypoint.sh"]
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== Blackbox Exporter (endpoint probing) =====
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    volumes:
      - ./app-config/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring-net
      - app-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ===== Grafana =====
  grafana:
    image: grafana/grafana:12.3.0
    env_file:
      - ./.config/docker/grafana.env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./app-config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

# Define secrets
secrets:
  ACTUATOR_USERNAME_secret:
    external: true
  ACTUATOR_PASSWORD_secret:
    external: true
  CORS_ALLOWED_ORIGINS_secret:
    external: true
  CORS_ALLOWED_METHODS_secret:
    external: true
  CORS_ALLOWED_HEADERS_secret:
    external: true
  CORS_EXPOSED_HEADERS_secret:
    external: true
  DATABASE_NAME_secret:
    external: true
  GEMINI_API_KEY_secret:
    external: true
  GMAIL_USERNAME_secret:
    external: true
  GMAIL_PASSWORD_secret:
    external: true
  JWT_SECRET_KEY_secret:
    external: true
  JWT_ISSUER_secret:
    external: true
  POSTGRES_USERNAME_secret:
    external: true
  POSTGRES_PASSWORD_secret:
    external: true
  POSTGRES_URL_secret:
    external: true
  POSTGRES_USER_secret:
    external: true
  POSTGRES_DB_secret:
    external: true
  PGDATA_secret:
    external: true
  REDIS_HOST_secret:
    external: true
  REDIS_PORT_secret:
    external: true
  REDIS_PASSWORD_secret:
    external: true
  SERVER_PORT_secret:
    external: true
  XRAY_EXECUTABLE_PATH_secret:
    external: true

# ===== Prometheus =====
  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./app-config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./app-config/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prom-data:/prometheus
    environment:
      - ACTUATOR_USERNAME_FILE=/run/secrets/ACTUATOR_USERNAME_secret
      - ACTUATOR_PASSWORD_FILE=/run/secrets/ACTUATOR_PASSWORD_secret
    networks:
      - monitoring-net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===== Alertmanager =====
  alertmanager:
    image: prom/alertmanager:v0.28.0
    env_file:
      - ./.config/docker/alertmanager.env
    volumes:
      - ./app-config/prometheus/alertmanager.yml.tpl:/etc/alertmanager/alertmanager.yml.tpl:ro
      - ./app-config/prometheus/alertmanager-entrypoint.sh:/usr/local/bin/alertmanager-entrypoint.sh:ro
      - alertmanager-data:/alertmanager
    entrypoint: ["/bin/sh", "/usr/local/bin/alertmanager-entrypoint.sh"]
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ===== Grafana =====
  grafana:
    image: grafana/grafana:12.3.0
    env_file:
      - ./.config/docker/grafana.env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./app-config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  pgdata:
  redis-data:
  prom-data:
  grafana-data:
  certbot-certs:
  certbot-webroot:
  alertmanager-data:

networks:
  app-net:
    driver: overlay
  monitoring-net:
    driver: overlay
