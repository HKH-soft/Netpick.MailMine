groups:
  - name: backend_alerts
    interval: 30s
    rules:
      # Backend service down
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend service is down"
          description: "Backend ({{ $labels.instance }}) has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High 5xx error rate detected"
          description: "Backend is experiencing {{ $value | humanizePercentage }} error rate."

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s (threshold: 2s)."

      # High memory usage
      - alert: HighMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High JVM heap memory usage"
          description: "JVM heap memory usage is {{ $value | humanizePercentage }} (threshold: 85%)."

      # Too many database connections
      - alert: HighDatabaseConnections
        expr: hikaricp_connections_active > 8
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High number of active database connections"
          description: "Active DB connections: {{ $value }} (check for connection leaks)."

      # Redis connection issues (if using Lettuce/Jedis metrics)
      - alert: RedisConnectionFailure
        expr: rate(lettuce_command_completion_seconds_count{status="failed"}[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Redis connection failures detected"
          description: "Backend is experiencing Redis connection failures."

  - name: prometheus_alerts
    interval: 30s
    rules:
      # Prometheus scrape failures
      - alert: PrometheusScrapeFailed
        expr: up{job="backend"} == 0
        for: 5m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "Prometheus cannot scrape backend"
          description: "Prometheus failed to scrape {{ $labels.job }} for 5 minutes."

  - name: blackbox_alerts
    interval: 30s
    rules:
      # Website down
      - alert: WebsiteDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Website is unreachable"
          description: "Target {{ $labels.instance }} has been down for more than 2 minutes."

      # High response time
      - alert: HighProbeResponseTime
        expr: probe_duration_seconds{job="blackbox-http"} > 5
        for: 5m
        labels:
          severity: warning
          service: blackbox
        annotations:
          summary: "High probe response time"
          description: "Target {{ $labels.instance }} response time is {{ $value }}s (threshold: 5s)."

      # SSL certificate expiring soon
      - alert: SSLCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          severity: warning
          service: blackbox
        annotations:
          summary: "SSL certificate expiring within 14 days"
          description: "Certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}."

      # Backend TCP unreachable
      - alert: BackendTCPDown
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Backend TCP port unreachable"
          description: "Cannot connect to {{ $labels.instance }} via TCP."

      # DNS resolution failure
      - alert: DNSResolutionFailure
        expr: probe_success{job="blackbox-dns"} == 0
        for: 5m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "DNS resolution failing"
          description: "Cannot resolve {{ $labels.instance }} via DNS."
