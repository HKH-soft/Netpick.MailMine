name: CD - Build Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Frontend/**

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Build Started - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ━━━━━━━━━━━━━━━━━━━━━━
            ⚛️ *FRONTEND DEPLOYMENT*
            ━━━━━━━━━━━━━━━━━━━━━━

            ▶️ *Status*: STARTED

            📦 *Repository*: `${{ github.repository }}`
            🌿 *Branch*: `${{ github.ref_name }}`
            👤 *Triggered by*: `${{ github.actor }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ━━━━━━━━━━━━━━━━━━━━━━

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Setup is completed - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ⚙️ *SETUP COMPLETED*

            🔧 *Phase*: Node.js Environment
            👤 *Actor*: `${{ github.actor }}`
            📝 *Commit*: `${{ github.event.commits[0].message }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set build number
        id: build-number
        run: echo "BUILD_NUMBER=$(date +'%d.%m.%Y.%H.%M.%S')" >> $GITHUB_OUTPUT

      - name: build number - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            🔢 *BUILD VERSION*

            🧱 *Version*: `${{ steps.build-number.outputs.BUILD_NUMBER }}`
            👤 *Author*: `${{ github.actor }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Build and Push Docker Image
        run: docker build . --push -t ${{ secrets.DOCKERHUB_USERNAME }}/netpick-frontend:${{steps.build-number.outputs.BUILD_NUMBER}} -t ${{ secrets.DOCKERHUB_USERNAME }}/netpick-frontend:latest

      - name: action is completed! - Message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ╔══════════════════════╗
            ║  ✅ DEPLOYMENT SUCCESS  ║
            ╚══════════════════════╝

            🎉 *Frontend Deployed Successfully*

            👤 *Deployed by*: `${{ github.actor }}`
            🔖 *Build*: `${{ steps.build-number.outputs.BUILD_NUMBER }}`
            📦 *Repository*: `${{ github.repository }}`
            🔗 [Final Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ━━━━━━━━━━━━━━━━━━━━━━

      - name: Send Telegram message on failure - Message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ╔══════════════════════╗
            ║  ❌ DEPLOYMENT FAILED  ║
            ╚══════════════════════╝

            🚨 *Frontend Deployment Failed*

            👤 *Triggered by*: `${{ github.actor }}`
            📝 *Commit*: `${{ github.event.commits[0].message }}`
            📦 *Repository*: `${{ github.repository }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha}})

            🛠 *Action Required*: [Check Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ━━━━━━━━━━━━━━━━━━━━━━
