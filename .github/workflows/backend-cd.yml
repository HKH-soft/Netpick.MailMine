name: CD - Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Backend/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: netpick
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Deployment Started - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ━━━━━━━━━━━━━━━━━━━━━━
            🚀 *BACKEND DEPLOYMENT*
            ━━━━━━━━━━━━━━━━━━━━━━

            ▶️ *Status*: STARTED

            📦 *Repository*: `${{ github.repository }}`
            🌿 *Branch*: `${{ github.ref_name }}`
            👤 *Triggered by*: `${{ github.actor }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ━━━━━━━━━━━━━━━━━━━━━━

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Setup is completed - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ⚙️ *SETUP COMPLETED*

            🔧 *Phase*: Environment Setup
            👤 *Actor*: `${{ github.actor }}`
            📝 *Commit*: `${{ github.event.commits[0].message }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set build number
        id: build-number
        run: echo "BUILD_NUMBER=$(date +'%d.%m.%Y.%H.%M.%S')" >> $GITHUB_OUTPUT

      - name: build number - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            🔢 *BUILD VERSION*

            🧱 *Version*: `${{ steps.build-number.outputs.BUILD_NUMBER }}`
            👤 *Author*: `${{ github.actor }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Build and Test with Maven
        env:
          # Database
          POSTGRES_URL: localhost:5432
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: password

          # Mail
          GMAIL_USERNAME: ""
          GMAIL_PASSWORD: ""

          # Security
          JWT_SECRET_KEY: ""
          JWT_ISSUER: ""

          # Server
          SERVER_PORT: 8080

          # Gemini
          GEMINI_API_KEY: ""
        run: mvn -ntp -B verify

      - name: Build and Push Docker Image
        run: docker build . --push -t ${{ secrets.DOCKERHUB_USERNAME }}/netpick-backend:${{steps.build-number.outputs.BUILD_NUMBER}} -t ${{ secrets.DOCKERHUB_USERNAME }}/netpick-backend:latest

      - name: maven build was successful  - Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ✅ *DOCKER BUILD SUCCESS*

            🐳 *Image Built & Pushed*
            🔖 *Tag*: `${{ steps.build-number.outputs.BUILD_NUMBER }}`
            👤 *Author*: `${{ github.actor }}`
            📁 *Repo*: `${{ github.repository }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: action is completed!  - Message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ╔══════════════════════╗
            ║  ✅ DEPLOYMENT SUCCESS  ║
            ╚══════════════════════╝

            🎉 *Backend Deployed Successfully*

            👤 *Deployed by*: `${{ github.actor }}`
            🔖 *Build*: `${{ steps.build-number.outputs.BUILD_NUMBER }}`
            📦 *Repository*: `${{ github.repository }}`
            🔗 [Final Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ━━━━━━━━━━━━━━━━━━━━━━

      - name: Send Telegram message on failure  - Message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: markdown
          message: |
            ╔══════════════════════╗
            ║  ❌ DEPLOYMENT FAILED  ║
            ╚══════════════════════╝

            🚨 *Backend Deployment Failed*

            👤 *Triggered by*: `${{ github.actor }}`
            📝 *Commit*: `${{ github.event.commits[0].message }}`
            📦 *Repository*: `${{ github.repository }}`
            🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha}})

            🛠 *Action Required*: [Check Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ━━━━━━━━━━━━━━━━━━━━━━
